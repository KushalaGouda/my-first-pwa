<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyApp</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#317EFB">

<style>

body{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
font-size:24px;
text-align:center;
}

/* BIG buttons */
button{
margin:15px;
padding:15px 35px;
font-size:28px;   /* h2 size */
cursor:pointer;
border:none;
background:#317EFB;
color:white;
border-radius:8px;
}

/* exit button bottom right */
#exitBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
}

</style>
</head>

<body>

<h1>WELCOME!</h1>
<p>This app works offline and installed.</p>

<button onclick="showWelcome()">Welcome</button>

<button id="installBtn" style="display:none;">Install App</button>

<button id="exitBtn" onclick="exitApp()">Exit</button>

<script src="app.js"></script>

<script>

function showWelcome(){
alert("Welcome to my first PWA!");
}
function exitApp(){
  window.location.href = "about:blank";
}



</script>

</body>
</html>
